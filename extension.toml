id = "v-enhanced"
name = "V Enhanced"
description = "V language support for Zed — powered by velvet with comprehensive syntax highlighting, intelligent completions, inlay hints, code lens, and more"
version = "0.6.3"
schema_version = 1
authors = ["Ouyang Dazhi <204389009+DaZhi-the-Revelator@users.noreply.github.com>"]
repository = "https://github.com/DaZhi-the-Revelator/zed-v-enhanced"

snippets = "snippets.json"

[grammars.v]
repository = "https://github.com/DaZhi-the-Revelator/tree-sitter-v"
commit = "b8100fe1bfa18c4ebca0434547a4a035fff86fda"

[language_servers.velvet]
name = "velvet"
languages = ["V"]

[language_servers.velvet.settings]
enable_semantic_tokens = "full"

[language_servers.velvet.settings.inlay_hints]
enable = true
enable_type_hints = true
enable_parameter_name_hints = true
enable_range_hints = true
enable_implicit_err_hints = true
enable_constant_type_hints = true
enable_enum_field_value_hints = true
enable_anon_fn_return_type_hints = true

[language_servers.velvet.settings.inspections]
enable_unused_parameter_warning = true

